<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Panvolks | v2.2</title>

<style>

:root{
--primary:#9b0000;
--secondary:#0a1429;
--bg:#050a14;
--card-bg:#101c33;
--text:#e0e0e0;
}

body{
font-family:Segoe UI,Arial;
background:var(--bg);
color:var(--text);
margin:0;
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:var(--secondary);
border-right:3px solid var(--primary);
display:flex;
flex-direction:column;
}

.logo-container{
padding:20px;
text-align:center;
}

.logo-img{
max-width:100%;
max-height:120px;
}

.nav-menu{
flex:1;
}

.nav-item{
padding:15px;
cursor:pointer;
color:#8899af;
}

.nav-item.active{
background:var(--primary);
color:#fff;
}

.main-content{
flex:1;
padding:30px;
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:var(--card-bg);
padding:20px;
border-radius:8px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#050a14;
border:1px solid #2d4273;
color:#fff;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:var(--primary);
border:none;
color:#fff;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #1a2b4d;
}

th{
color:var(--primary);
}

</style>
</head>

<body>

<aside class="sidebar">

<div class="logo-container">
<img src="Panvolks_L.png" class="logo-img">
</div>

<nav class="nav-menu">

<div class="nav-item active" onclick="showTab(event,'dashboard')">
🏠 Início
</div>

<div class="nav-item" onclick="showTab(event,'cadastro')">
📝 Cadastro
</div>

<div class="nav-item" onclick="showTab(event,'operacao')">
🔧 Operação
</div>

</nav>
</aside>

<main class="main-content">

<section id="dashboard" class="tab-content active">

<h2>Ferramentas em Uso</h2>

<div class="card">

<table>

<thead>
<tr>
<th>Item</th>
<th>Colaborador</th>
<th>Saída</th>
</tr>
</thead>

<tbody id="corpoTabela"></tbody>

</table>

</div>
</section>

<section id="cadastro" class="tab-content">

<h2>Cadastro</h2>

<div class="grid">

<div class="card">

<h3>Novo Funcionário</h3>

<input id="cadFunc" placeholder="Nome completo">

<button onclick="salvarItem('funcionarios','cadFunc')">
Cadastrar
</button>

</div>

<div class="card">

<h3>Nova Ferramenta</h3>

<input id="cadFerr" placeholder="Nome ou ID">

<button onclick="salvarItem('ferramentas','cadFerr')">
Cadastrar
</button>

</div>

<div class="card">

<h3>Nova Maleta</h3>

<input id="cadMaleta" placeholder="Nome da maleta">

<input id="cadFerrMaleta" placeholder="Ferramentas separadas por vírgula">

<button onclick="salvarMaleta()">
Cadastrar
</button>

</div>

</div>

</section>

<section id="operacao" class="tab-content">

<h2>Retirada / Devolução</h2>

<div class="grid">

<div class="card">

<h3>Retirada</h3>

<select id="selFunc"></select>

<label>Ferramenta</label>
<select id="selFerr"></select>

<label>Maleta</label>
<select id="selMaleta" onchange="abrirMaleta()">
<option value="">Nenhuma</option>
</select>

<label>Ferramenta da maleta</label>
<select id="selFerrMaleta">
<option value="">Selecione</option>
</select>

<input type="password" id="passRetirada" placeholder="Senha">

<button onclick="registrarSaida()">
Confirmar Saída
</button>

</div>

<div class="card">

<h3>Devolução</h3>

<select id="selDevol"></select>

<input type="password" id="passDevol" placeholder="Senha">

<button onclick="registrarRetorno()">
Confirmar Retorno
</button>

</div>

</div>

</section>

</main>

<script>

let db={
funcionarios:JSON.parse(localStorage.getItem('pv_funcs'))||[],
ferramentas:JSON.parse(localStorage.getItem('pv_ferrs'))||[],
maletas:JSON.parse(localStorage.getItem('pv_maletas'))||[],
emUso:JSON.parse(localStorage.getItem('pv_uso'))||[]
}

function showTab(e,id){

document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'))
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))

document.getElementById(id).classList.add('active')

if(e) e.currentTarget.classList.add('active')

}

function atualizarDados(){

localStorage.setItem('pv_funcs',JSON.stringify(db.funcionarios))
localStorage.setItem('pv_ferrs',JSON.stringify(db.ferramentas))
localStorage.setItem('pv_maletas',JSON.stringify(db.maletas))
localStorage.setItem('pv_uso',JSON.stringify(db.emUso))

render()

}

function salvarItem(tipo,id){

let v=document.getElementById(id).value.trim()

if(v){

db[tipo].push(v)

document.getElementById(id).value=''

atualizarDados()

alert("Cadastrado")

}

}

function salvarMaleta(){

let nome=document.getElementById("cadMaleta").value.trim()
let ferrTexto=document.getElementById("cadFerrMaleta").value.trim()

if(nome===""||ferrTexto===""){
alert("Preencha os campos")
return
}

let ferramentas=ferrTexto.split(",")

db.maletas.push({
nome:nome,
ferramentas:ferramentas
})

document.getElementById("cadMaleta").value=""
document.getElementById("cadFerrMaleta").value=""

atualizarDados()

alert("Maleta cadastrada")

}

function abrirMaleta(){

let nome=document.getElementById("selMaleta").value
let lista=document.getElementById("selFerrMaleta")

lista.innerHTML='<option value="">Selecione</option>'

let maleta=db.maletas.find(m=>m.nome===nome)

if(!maleta) return

maleta.ferramentas.forEach(f=>{

let ferr=f.trim()

lista.innerHTML+=`<option value="${ferr}">${ferr}</option>`

})

}

function registrarSaida(){

let f=document.getElementById("selFunc").value
let t=document.getElementById("selFerrMaleta").value || document.getElementById("selFerr").value
let s=document.getElementById("passRetirada").value

if(f && t && s==="9578"){

db.emUso.push({
f:f,
t:t,
data:new Date().toLocaleString("pt-BR")
})

db.ferramentas=db.ferramentas.filter(x=>x!==t)

document.getElementById("passRetirada").value=""

atualizarDados()

alert("Retirada registrada")

}

else{

alert("Dados ou senha incorretos")

}

}

function registrarRetorno(){

let idx=document.getElementById("selDevol").value
let s=document.getElementById("passDevol").value

if(idx!=="" && s==="9578"){

let r=db.emUso.splice(idx,1)[0]

db.ferramentas.push(r.t)

document.getElementById("passDevol").value=""

atualizarDados()

alert("Devolução registrada")

}

else{

alert("Erro")

}

}

function render(){

let f=document.getElementById("selFunc")
let t=document.getElementById("selFerr")
let m=document.getElementById("selMaleta")
let d=document.getElementById("selDevol")
let tb=document.getElementById("corpoTabela")

f.innerHTML='<option value="">Funcionário</option>'

db.funcionarios.forEach(x=>{
f.innerHTML+=`<option>${x}</option>`
})

t.innerHTML='<option value="">Ferramenta</option>'

db.ferramentas.forEach(x=>{
t.innerHTML+=`<option>${x}</option>`
})

m.innerHTML='<option value="">Nenhuma</option>'

db.maletas.forEach(x=>{
m.innerHTML+=`<option value="${x.nome}">${x.nome}</option>`
})

d.innerHTML='<option value="">Item</option>'

tb.innerHTML=""

db.emUso.forEach((x,i)=>{

d.innerHTML+=`<option value="${i}">
${x.t} (com ${x.f})
</option>`

tb.innerHTML+=`
<tr>
<td>${x.t}</td>
<td>${x.f}</td>
<td>${x.data}</td>
</tr>`

})

if(db.emUso.length===0){

tb.innerHTML='<tr><td colspan=3>Nenhuma ferramenta em uso</td></tr>'

}

}

render()

</script>

</body>
</html>
